<body class="game-platform-page typing-quest-page">
  <script>
    (function() {
      var theme = "";
      try { theme = localStorage.getItem("cs.game.theme") || ""; } catch (_error) {}
      if (theme && theme !== "default") document.body.setAttribute("data-game-theme", theme);
    })();
  </script>
  <main class="cg-shell">
    <div id="cg-shell"></div>
    <div id="cg-live-region" aria-live="polite" aria-atomic="true" class="cg-hidden"></div>
  </main>

  <script src="./games/content/typing-placement-content.js?v=20260309a"></script>
  <script src="./games/content/game-content-generator.js?v=20260306a"></script>
  <script src="./games/content/game-content-registry.js?v=20260307b"></script>

  <script src="./games/ui/game-components.js?v=20260310c"></script>
  <script src="./games/ui/game-shell.js?v=20260312j"></script>
  <script>
    (function () {
      var url = new URL(window.location.href);
      if (url.searchParams.get("play") === "1" && url.searchParams.get("game") === "word-typing") return;
      url.searchParams.set("play", "1");
      url.searchParams.set("game", "word-typing");
      url.searchParams.set("typingPage", "1");
      if (!url.searchParams.get("typingCourseMode")) url.searchParams.set("typingCourseMode", "placement");
      window.history.replaceState({}, "", url.toString());
    })();
    window.CSGameShell && window.CSGameShell.init && window.CSGameShell.init();
  </script>
