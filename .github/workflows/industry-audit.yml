name: Industry Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '30 9 * * 1'

permissions:
  contents: read

jobs:
  full-industry-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run full industry audit bundle
        run: npm run audit:industry
      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: industry-audit-artifacts-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            test-results/**
            playwright-report/**
            .artifacts/**
